name: CI – Build, Test & Deploy

on:
  push:
    branches: ["main", "develop", "copilot/**"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    # Nightly build at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_live:
        description: "Enable live trading mode"
        required: false
        default: "false"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  CHECKPOINT_DIR: checkpoints
  LOG_DIR: logs

jobs:
  # ── 1. Build & Unit Tests ─────────────────────────────────────────────────
  build_and_test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        compiler: [gcc-12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-12 g++-12 \
            libhiredis-dev \
            redis-server \
            valgrind

      - name: Set compiler
        run: |
          echo "CC=gcc-12"  >> $GITHUB_ENV
          echo "CXX=g++-12" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_TESTS=ON \
            -DENABLE_TELEMETRY=ON \
            -DUSE_REDIS=OFF \
            -DUSE_LIBTORCH=OFF \
            -DCMAKE_CXX_COMPILER=g++-12

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure -T test --timeout 120

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: build/Testing/**/*.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daydream_handler-${{ matrix.os }}
          path: build/src/daydream_handler

      - name: Upload logs & telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}
          path: |
            logs/
            checkpoints/

  # ── 2. Static Analysis ────────────────────────────────────────────────────
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    needs: build_and_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I src \
            src/ 2>&1 | tee cppcheck_report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.txt

  # ── 3. Replay Simulation ──────────────────────────────────────────────────
  replay_simulation:
    name: Replay Simulation
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    needs: build_and_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: daydream_handler-ubuntu-22.04
          path: build/src/

      - name: Make executable
        run: chmod +x build/src/daydream_handler

      - name: Run info command
        run: ./build/src/daydream_handler info

      - name: Run checkpoint list
        run: ./build/src/daydream_handler checkpoint

      - name: Upload replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-output
          path: |
            logs/
            checkpoints/

  # ── 4. Release Build ──────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    needs: [build_and_test, static_analysis]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: daydream_handler-ubuntu-22.04
          path: dist/

      - name: Create release archive
        run: |
          chmod +x dist/daydream_handler
          tar czf daydream_handler-linux-amd64.tar.gz -C dist .

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: daydream_handler-linux-amd64.tar.gz
