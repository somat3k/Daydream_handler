name: Debug â€“ Auto-Scan & Copilot PR

on:
  workflow_run:
    workflows: ["CI â€“ Build, Test & Deploy"]
    types: [completed]
  schedule:
    # Daily diagnostic scan at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  # â”€â”€ Scan last workflow logs for failures â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  scan_logs:
    name: Scan Workflow Logs
    runs-on: ubuntu-22.04

    outputs:
      has_failures: ${{ steps.check.outputs.has_failures }}
      failure_summary: ${{ steps.check.outputs.failure_summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download last CI logs
        uses: actions/download-artifact@v4
        with:
          pattern: logs-*
          merge-multiple: true
          path: ci_logs/
        continue-on-error: true

      - name: Scan for failures
        id: check
        run: |
          HAS_FAIL=false
          SUMMARY=""
          if [ -d ci_logs/ ]; then
            while IFS= read -r -d '' f; do
              if grep -qiE "(error|fatal|exception|assert)" "$f"; then
                HAS_FAIL=true
                SUMMARY="$SUMMARY\n$(basename "$f"): $(grep -m1 -iE '(error|fatal)' "$f")"
              fi
            done < <(find ci_logs/ -name "*.log" -print0)
          fi
          echo "has_failures=$HAS_FAIL"       >> $GITHUB_OUTPUT
          echo "failure_summary<<EOF"         >> $GITHUB_OUTPUT
          printf '%b' "$SUMMARY"              >> $GITHUB_OUTPUT
          echo ""                             >> $GITHUB_OUTPUT
          echo "EOF"                          >> $GITHUB_OUTPUT

  # â”€â”€ Auto-debug PR with Copilot if failures detected â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  auto_debug_pr:
    name: Auto Debug PR
    runs-on: ubuntu-22.04
    needs: scan_logs
    if: needs.scan_logs.outputs.has_failures == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create debug branch
        id: branch
        run: |
          BRANCH="auto/debug-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Append debug note
        run: |
          echo "# Auto-Debug Report $(date -u)" >> AUTOFIX.md
          echo "" >> AUTOFIX.md
          echo "## Failure Summary" >> AUTOFIX.md
          echo "${{ needs.scan_logs.outputs.failure_summary }}" >> AUTOFIX.md
          echo "" >> AUTOFIX.md
          echo "## Actions Required" >> AUTOFIX.md
          echo "- [ ] Review logs in ci_logs/ artifacts" >> AUTOFIX.md
          echo "- [ ] Run \`cmake --build build --target unit_tests\`" >> AUTOFIX.md
          echo "- [ ] Check telemetry in logs/telemetry/scalars.jsonl" >> AUTOFIX.md

      - name: Commit debug note
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AUTOFIX.md
          git commit -m "chore: auto-debug report $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          FAILURE_SUMMARY: ${{ needs.scan_logs.outputs.failure_summary }}
          DEBUG_BRANCH: ${{ steps.branch.outputs.branch }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const summary = process.env.FAILURE_SUMMARY || '(no details)';
            const branch  = process.env.DEBUG_BRANCH;
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Auto-Debug] Failures detected ${new Date().toISOString().slice(0,10)}`,
              head:  branch,
              base:  'main',
              body: [
                '## ðŸ¤– Auto-Debug Report',
                '',
                '**Failure Summary:**',
                '```',
                summary,
                '```',
                '',
                '**Next Steps:**',
                '- [ ] Review CI logs',
                '- [ ] Check telemetry artifacts',
                '- [ ] Apply Copilot suggestions',
              ].join('\n'),
              draft: false,
            });
            core.info(`PR created: ${pr.html_url}`);

  # â”€â”€ Nightly health check â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  nightly_health:
    name: Nightly Health Check
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps & build
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build gcc-12 g++-12 valgrind libhdf5-dev
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DUSE_REDIS=OFF \
            -DUSE_LIBTORCH=OFF \
            -DUSE_HDF5=ON \
            -DCMAKE_CXX_COMPILER=g++-12
          cmake --build build --parallel $(nproc)

      - name: Run tests with memory check
        working-directory: build
        run: ctest --output-on-failure -T memcheck --timeout 300
        continue-on-error: true

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-health-report
          path: build/Testing/
